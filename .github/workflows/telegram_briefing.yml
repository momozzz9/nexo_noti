# =============================================================================
# GitHub Actions - Telegram 정기 브리핑 자동 실행
# =============================================================================
# 매일 4시간 간격, 5회 실행 (KST 기준):
#   07:00 KST = 22:00 UTC (전날)
#   11:00 KST = 02:00 UTC
#   15:00 KST = 06:00 UTC
#   19:00 KST = 10:00 UTC
#   24:00 KST = 15:00 UTC
# 수동 실행(workflow_dispatch)도 지원
#
# 필요한 GitHub Secrets (2개만!):
#   - TELEGRAM_BOT_TOKEN   : Telegram 봇 토큰
#   - TELEGRAM_CHAT_ID     : 메시지 수신할 Chat ID
# =============================================================================

name: Telegram 정기 브리핑 (아침 7시)

# ---------------------------------------------
# 실행 트리거 설정
# ---------------------------------------------
on:
  # 스케줄 실행 (cron 표현식, UTC 기준)
  # KST 07:00 = UTC 22:00 (전날)
  schedule:
    - cron: '0 22 * * *'

  # 수동 실행 지원
  workflow_dispatch:

# ---------------------------------------------
# 작업(Job) 정의
# ---------------------------------------------
jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser python-dotenv

      - name: 🚀 정기 브리핑 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/"4_AI_test/My Telegram Noti (nexo)"
          python "4_AI_test/My Telegram Noti (nexo)/telegram_nexo_noti.py"

