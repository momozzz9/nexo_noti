# =============================================================================
# GitHub Actions - Telegram 정기 브리핑 자동 실행
# =============================================================================
# 매일 4시간 간격, 5회 실행 (KST 기준):
#   07:00 KST = 22:00 UTC (전날)
#   11:00 KST = 02:00 UTC
#   15:00 KST = 06:00 UTC
#   19:00 KST = 10:00 UTC
#   24:00 KST = 15:00 UTC
# 수동 실행(workflow_dispatch)도 지원
#
# 필요한 GitHub Secrets (2개만!):
#   - TELEGRAM_BOT_TOKEN   : Telegram 봇 토큰
#   - TELEGRAM_CHAT_ID     : 메시지 수신할 Chat ID
# =============================================================================

name: Telegram 정기 브리핑

# ---------------------------------------------
# 실행 트리거 설정
# ---------------------------------------------
on:
  # 스케줄 실행 (cron 표현식, UTC 기준)
  # KST 07/11/15/19/24시 = UTC 22/02/06/10/15시
  schedule:
    - cron: '0 22,2,6,10,15 * * *'

  # 수동 실행 지원 (GitHub Actions 탭에서 "Run workflow" 버튼)
  workflow_dispatch:

# ---------------------------------------------
# 작업(Job) 정의
# ---------------------------------------------
jobs:
  send-briefing:
    # 실행 환경: Ubuntu 최신 LTS
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------
      # Step 1: 저장소 코드 체크아웃
      # -----------------------------------------------
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      # -----------------------------------------------
      # Step 2: Python 환경 설정
      # -----------------------------------------------
      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # -----------------------------------------------
      # Step 3: 의존성 설치
      # -----------------------------------------------
      - name: 📦 의존성 설치
        run: |
          python -m pip install --upgrade pip
          # 두 프로젝트의 모든 필요한 라이브러리 설치
          pip install requests feedparser jinja2 beautifulsoup4 python-dotenv openai

      # -----------------------------------------------
      # Step 4: 정기 브리핑 스크립트 실행
      # -----------------------------------------------
      - name: 🚀 정기 브리핑 전송
        env:
          # GitHub Secrets에서 환경 변수 주입
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 이메일 발송용 Secrets (등록된 경우에만 작동)
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 모든 관련 폴더를 경로에 추가
          export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/"4_AI_test/My Telegram Noti (nexo)":$(pwd)/"4_AI_test/My Email Noti (news)"
          python "4_AI_test/My Telegram Noti (nexo)/telegram_nexo_noti.py"

